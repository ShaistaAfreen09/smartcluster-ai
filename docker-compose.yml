version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartcluster_db
    environment:
      POSTGRES_DB: smartcluster
      POSTGRES_USER: sre_admin
      POSTGRES_PASSWORD: sre_secure_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre_admin -d smartcluster"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartcluster_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://sre_admin:sre_secure_password_2026@db:5432/smartcluster
      - JWT_SECRET=prod_sre_platform_jwt_signing_key_2026
      - ENVIRONMENT=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartcluster_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
