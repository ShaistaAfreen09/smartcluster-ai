version: "3.8"

services:
  # Python 3.12 FastAPI backend serving autonomic operations
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smartcluster
      - PROMETHEUS_URL=http://prometheus:9090
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-super-secret-smartcluster-access-key}
      - AUTH_MODE=${AUTH_MODE:-mock}
    depends_on:
      - db
      - redis
      - prometheus
    restart: always

  # Relational operational and security database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smartcluster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Telemetry collection & scraping
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus_config:/etc/prometheus
    restart: always

  # Distributed key-value cache layer
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
  prometheus_config:
