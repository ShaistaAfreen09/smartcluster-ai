apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartcluster-backend-hpa
  namespace: smartcluster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartcluster-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartcluster-frontend-hpa
  namespace: smartcluster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartcluster-frontend
  minReplicas: 3
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
