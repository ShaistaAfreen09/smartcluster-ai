apiVersion: v1
kind: Service
metadata:
  name: smartcluster-frontend-svc
  namespace: smartcluster
  labels:
    app: smartcluster-frontend
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: smartcluster-frontend
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: smartcluster-backend-svc
  namespace: smartcluster
  labels:
    app: smartcluster-backend
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: smartcluster-backend
  type: ClusterIP
