apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartcluster-ingress
  namespace: smartcluster
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  rules:
  - host: smartcluster.sre-platform.corp
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartcluster-frontend-svc
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: smartcluster-backend-svc
            port:
              number: 8000
